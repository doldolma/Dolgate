services:
  mysql:
    image: mysql:8.4
    container_name: dolssh-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: dolssh
      MYSQL_USER: dolssh_user
      MYSQL_PASSWORD: CHANGE_ME_PASSWORD
      MYSQL_ROOT_PASSWORD: CHANGE_ME_ROOT_PASSWORD
      TZ: Asia/Seoul
    volumes:
      - ../data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pCHANGE_ME_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  sync-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dolssh-sync-api:latest
    container_name: dolssh-sync-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DOLSSH_API_CONFIG_PATH: /app/config/production.json
      TZ: Asia/Seoul
    volumes:
      - ../config/production.json:/app/config/production.json:ro
