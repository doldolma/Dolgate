name: Build desktop release
run-name: Desktop Release • ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Verify desktop version matches tag
        shell: bash
        run: |
          node - <<'NODE'
          const desktopVersion = require('./apps/desktop/package.json').version;
          const tagName = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${desktopVersion}`;
          if (tagName !== expectedTag) {
            console.error(`Desktop version mismatch: expected ${expectedTag}, got ${tagName}`);
            process.exit(1);
          }
          console.log(`Desktop version ${desktopVersion} matches ${tagName}`);
          NODE

  ssh-core-test:
    name: ssh-core test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run ssh-core tests
        working-directory: services/ssh-core
        run: go test ./... -cover

      - name: Set up Node.js
        if: matrix.os != 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: matrix.os != 'ubuntu-latest'
        run: npm ci

      - name: Prepare desktop dev ssh-core binaries
        if: matrix.os != 'ubuntu-latest'
        run: npm run prepare:ssh-core:dev --workspace @dolssh/desktop

      - name: Verify macOS desktop helper binaries
        if: matrix.os == 'macos-latest'
        run: |
          test -f apps/desktop/release/resources/darwin/universal/bin/ssh-core
          test -f apps/desktop/release/resources/darwin/universal/bin/dolgate-dns-helper

      - name: Verify Windows desktop helper binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          test -f apps/desktop/release/resources/win32/x64/bin/ssh-core.exe
          test -f apps/desktop/release/resources/win32/x64/bin/dolgate-dns-helper.exe
          test -f apps/desktop/release/resources/win32/x64/bin/aws-conpty-wrapper.exe

  renderer-test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop renderer tests
        run: npm run test:desktop:renderer --workspace @dolssh/desktop

  build-mac:
    runs-on: macos-latest
    needs:
      - verify-version
      - renderer-test
      - ssh-core-test
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release artifacts
        run: npm run release:dist:mac --workspace @dolssh/desktop

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-mac
          path: apps/desktop/release/dist/*
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    needs:
      - verify-version
      - renderer-test
      - ssh-core-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release artifacts
        run: npm run release:dist:win --workspace @dolssh/desktop

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-win
          path: apps/desktop/release/dist/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
    steps:
      - name: Download desktop release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-release-*
          merge-multiple: true

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release-artifacts/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
