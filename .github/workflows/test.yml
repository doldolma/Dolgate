name: Repository Test
run-name: Repository Test • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  MOBILE_RUSSH_ANDROID_TARGETS: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
  MOBILE_RUSSH_CARGO_NDK_VERSION: "4.1.2"
  MOBILE_RUSSH_NDK_VERSION: "27.1.12297006"

jobs:
  ssh-core-test:
    name: ssh-core test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run ssh-core tests
        working-directory: services/ssh-core
        run: go test ./... -cover

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare desktop dev ssh-core binaries
        run: npm run prepare:ssh-core:dev --workspace @dolssh/desktop

      - name: Verify macOS desktop helper binaries
        if: matrix.os == 'macos-latest'
        run: |
          test -f apps/desktop/release/resources/darwin/universal/bin/ssh-core
          test -f apps/desktop/release/resources/darwin/universal/bin/dolgate-dns-helper

      - name: Verify Windows desktop helper binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          test -f apps/desktop/release/resources/win32/x64/bin/ssh-core.exe
          test -f apps/desktop/release/resources/win32/x64/bin/dolgate-dns-helper.exe
          test -f apps/desktop/release/resources/win32/x64/bin/aws-conpty-wrapper.exe

  desktop-test:
    name: desktop test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop tests
        run: npm run test:desktop

  mobile-test:
    name: mobile test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mobile typecheck
        run: npm run typecheck:mobile

      - name: Run mobile tests
        run: npm run test:mobile -- --runInBand

  mobile-native-check:
    name: mobile native artifact check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          sdkmanager "ndk;${MOBILE_RUSSH_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${MOBILE_RUSSH_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${MOBILE_RUSSH_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.MOBILE_RUSSH_ANDROID_TARGETS }}

      - name: Cache mobile russh Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/registry
            ~/.cargo/git
            packages/fressh-react-native-uniffi-russh/rust/target
          key: mobile-russh-cargo-${{ runner.os }}-${{ env.MOBILE_RUSSH_CARGO_NDK_VERSION }}-${{ env.MOBILE_RUSSH_NDK_VERSION }}-${{ hashFiles('packages/fressh-react-native-uniffi-russh/rust/Cargo.lock', 'packages/fressh-react-native-uniffi-russh/rust/rust-toolchain.toml', 'package-lock.json') }}
          restore-keys: |
            mobile-russh-cargo-${{ runner.os }}-${{ env.MOBILE_RUSSH_CARGO_NDK_VERSION }}-${{ env.MOBILE_RUSSH_NDK_VERSION }}-
            mobile-russh-cargo-${{ runner.os }}-

      - name: Install cargo-ndk
        shell: bash
        run: |
          if ! cargo ndk --version 2>/dev/null | grep -q "cargo-ndk ${MOBILE_RUSSH_CARGO_NDK_VERSION}"; then
            cargo install cargo-ndk --version "${MOBILE_RUSSH_CARGO_NDK_VERSION}" --locked --force
          fi
          cargo ndk --version

      - name: Install dependencies
        run: npm ci

      - name: Regenerate mobile russh Android artifacts
        run: npm run mobile:russh:regenerate -- --platform android

      - name: Verify generated artifacts are committed
        shell: bash
        run: |
          # Android static archives are not byte-for-byte stable across host
          # toolchains, and generated C++ formatting depends on whether
          # clang-format is installed on the runner. The JS/type outputs are
          # deterministic and carry the UniFFI contract, so use them as the
          # freshness gate here while release builds still regenerate native
          # artifacts on the runner.
          git diff --exit-code -- \
            packages/fressh-react-native-uniffi-russh/src/generated \
            packages/fressh-react-native-uniffi-russh/lib/module \
            packages/fressh-react-native-uniffi-russh/lib/typescript

          if ! git diff --quiet -- \
            packages/fressh-react-native-uniffi-russh/cpp/generated \
            packages/fressh-react-native-uniffi-russh/android/src/main/jniLibs; then
            echo "::notice::Native binary/C++ outputs changed after regeneration; ignored because they are runner-toolchain dependent."
            git diff --name-only -- \
              packages/fressh-react-native-uniffi-russh/cpp/generated \
              packages/fressh-react-native-uniffi-russh/android/src/main/jniLibs
          fi
