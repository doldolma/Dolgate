name: Sync API Container Publish
run-name: Sync API Container Publish • ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify repository version matches tag
        id: version
        shell: bash
        run: |
          npm run version:check
          node - <<'NODE'
          const rootVersion = require('./package.json').version;
          const tagName = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${rootVersion}`;
          if (tagName !== expectedTag) {
            console.error(`Repository version mismatch: expected ${expectedTag}, got ${tagName}`);
            process.exit(1);
          }
          console.log(`Repository version ${rootVersion} matches ${tagName}`);
          require('node:fs').appendFileSync(process.env.GITHUB_OUTPUT, `version=${rootVersion}\n`);
          NODE

  test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run sync-api tests
        working-directory: services/sync-api
        run: go test ./... -cover

      - name: Run ssh-core AWS tests
        working-directory: services/ssh-core
        run: go test ./internal/awssession/... ./cmd/ssh-core/...

  publish:
    runs-on: ubuntu-latest
    needs:
      - verify-version
      - test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/doldolma/dolgate-sync-api
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/sync-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.verify-version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
