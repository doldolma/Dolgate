name: Desktop tests
run-name: Desktop Tests • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ssh-core-test:
    name: ssh-core test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run ssh-core tests
        working-directory: services/ssh-core
        run: go test ./... -cover

      - name: Set up Node.js
        if: matrix.os != 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: matrix.os != 'ubuntu-latest'
        run: npm ci

      - name: Prepare desktop dev ssh-core binaries
        if: matrix.os != 'ubuntu-latest'
        run: npm run prepare:ssh-core:dev --workspace @dolssh/desktop

      - name: Verify macOS desktop helper binaries
        if: matrix.os == 'macos-latest'
        run: |
          test -f apps/desktop/release/resources/darwin/universal/bin/ssh-core
          test -f apps/desktop/release/resources/darwin/universal/bin/dolgate-dns-helper

      - name: Verify Windows desktop helper binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          test -f apps/desktop/release/resources/win32/x64/bin/ssh-core.exe
          test -f apps/desktop/release/resources/win32/x64/bin/dolgate-dns-helper.exe
          test -f apps/desktop/release/resources/win32/x64/bin/aws-conpty-wrapper.exe

  desktop-test:
    name: desktop test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop tests
        run: npm run test:desktop
