name: Desktop renderer
run-name: Desktop Renderer • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  renderer-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop renderer tests
        run: npm run test:desktop:renderer --workspace @dolssh/desktop
