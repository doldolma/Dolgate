name: Repository Release
run-name: Repository Release • ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MOBILE_RUSSH_ANDROID_TARGETS: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
  MOBILE_RUSSH_CARGO_NDK_VERSION: "4.1.2"
  MOBILE_RUSSH_NDK_VERSION: "27.1.12297006"

concurrency:
  group: repository-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify repository version matches tag
        id: version
        shell: bash
        run: |
          npm run version:check
          node - <<'NODE'
          const rootVersion = require('./package.json').version;
          const tagName = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${rootVersion}`;
          if (tagName !== expectedTag) {
            console.error(`Repository version mismatch: expected ${expectedTag}, got ${tagName}`);
            process.exit(1);
          }
          console.log(`Repository version ${rootVersion} matches ${tagName}`);
          require('node:fs').appendFileSync(process.env.GITHUB_OUTPUT, `version=${rootVersion}\n`);
          NODE

  ssh-core-test:
    name: ssh-core test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run ssh-core tests
        working-directory: services/ssh-core
        run: go test ./... -cover

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare desktop dev ssh-core binaries
        run: npm run prepare:ssh-core:dev --workspace @dolssh/desktop

      - name: Verify macOS desktop helper binaries
        if: matrix.os == 'macos-latest'
        run: |
          test -f apps/desktop/release/resources/darwin/universal/bin/ssh-core
          test -f apps/desktop/release/resources/darwin/universal/bin/dolgate-dns-helper

      - name: Verify Windows desktop helper binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          test -f apps/desktop/release/resources/win32/x64/bin/ssh-core.exe
          test -f apps/desktop/release/resources/win32/x64/bin/dolgate-dns-helper.exe
          test -f apps/desktop/release/resources/win32/x64/bin/aws-conpty-wrapper.exe

  desktop-test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop tests
        run: npm run test:desktop

  mobile-test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mobile typecheck
        run: npm run typecheck:mobile

      - name: Run mobile tests
        run: npm run test:mobile -- --runInBand

  build-mac:
    runs-on: macos-latest
    needs:
      - verify-version
      - desktop-test
      - mobile-test
      - ssh-core-test
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release artifacts
        run: npm run release:dist:mac --workspace @dolssh/desktop

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-mac
          path: apps/desktop/release/dist/*
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    needs:
      - verify-version
      - desktop-test
      - mobile-test
      - ssh-core-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release artifacts
        run: npm run release:dist:win --workspace @dolssh/desktop

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-win
          path: apps/desktop/release/dist/*
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    needs:
      - verify-version
      - mobile-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          sdkmanager "ndk;${MOBILE_RUSSH_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${MOBILE_RUSSH_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${MOBILE_RUSSH_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.MOBILE_RUSSH_ANDROID_TARGETS }}

      - name: Cache mobile russh Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/registry
            ~/.cargo/git
            packages/fressh-react-native-uniffi-russh/rust/target
          key: mobile-russh-cargo-${{ runner.os }}-${{ env.MOBILE_RUSSH_CARGO_NDK_VERSION }}-${{ env.MOBILE_RUSSH_NDK_VERSION }}-${{ hashFiles('packages/fressh-react-native-uniffi-russh/rust/Cargo.lock', 'packages/fressh-react-native-uniffi-russh/rust/rust-toolchain.toml', 'package-lock.json') }}
          restore-keys: |
            mobile-russh-cargo-${{ runner.os }}-${{ env.MOBILE_RUSSH_CARGO_NDK_VERSION }}-${{ env.MOBILE_RUSSH_NDK_VERSION }}-
            mobile-russh-cargo-${{ runner.os }}-

      - name: Install cargo-ndk
        shell: bash
        run: |
          if ! cargo ndk --version 2>/dev/null | grep -q "cargo-ndk ${MOBILE_RUSSH_CARGO_NDK_VERSION}"; then
            cargo install cargo-ndk --version "${MOBILE_RUSSH_CARGO_NDK_VERSION}" --locked --force
          fi
          cargo ndk --version

      - name: Install dependencies
        run: npm ci

      - name: Prepare mobile russh Android artifacts
        run: npm run mobile:russh:ensure -- --platform android

      - name: Restore Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          if [ -z "${ANDROID_RELEASE_KEYSTORE_BASE64}" ]; then
            echo "ANDROID_RELEASE_KEYSTORE_BASE64 is not configured."
            exit 1
          fi

          echo "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/dolgate-upload.keystore"

      - name: Build signed Android release APK
        env:
          DOLGATE_ANDROID_RELEASE_STORE_FILE: ${{ runner.temp }}/dolgate-upload.keystore
          DOLGATE_ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          DOLGATE_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          DOLGATE_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: npm run build:mobile:android

      - name: Prepare Android release artifact
        shell: bash
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          mkdir -p release-artifacts
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "release-artifacts/Dolgate-android-v${version}.apk"

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-android
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - verify-version
      - build-mac
      - build-win
      - build-android
    steps:
      - name: Download desktop release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-release-*
          merge-multiple: true

      - name: Download Android release artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-release-android
          path: release-artifacts

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload unified release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release-artifacts/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
